<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Standoff Tactics – Space</title>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:#080808; display:flex; flex-direction:column; align-items:stretch;
      height:100vh; font-family:system-ui,sans-serif; color:#e8e8f0;
      user-select:none; -webkit-app-region:no-drag; overflow:hidden;
    }
    .header {
      width:100%; display:flex; align-items:center; gap:12px;
      padding:8px 20px; background:#0d0d0d;
      border-bottom:1px solid rgba(255,255,255,0.06); flex-shrink:0; height:46px;
    }
    .back-btn {
      background:#161616; border:1px solid rgba(255,255,255,0.07);
      border-radius:7px; color:#8888aa; font-size:12px; padding:5px 12px;
      cursor:pointer; display:flex; align-items:center; gap:5px; transition:all 0.15s;
    }
    .back-btn:hover { color:#e8e8f0; border-color:rgba(239,68,68,0.4); }
    .info-row { margin-left:auto; display:flex; gap:10px; align-items:center; font-size:12px; }
    .badge { background:#161616; border:1px solid rgba(255,255,255,0.07); border-radius:6px; padding:4px 12px; font-weight:700; }
    canvas { display:block; flex:1; }
    #overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.88);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:10;
    }
    #overlay h2 { font-size:28px; }
    #overlay .sub { font-size:14px; color:#8888aa; text-align:center; max-width:420px; }
    #overlay button {
      background:#dc2626; border:none; border-radius:9px;
      color:#fff; font-size:15px; font-weight:700; padding:12px 36px; cursor:pointer;
    }
    #overlay button:hover { background:#b91c1c; }
    #overlay .ctrl-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:8px 36px;
      font-size:12px; color:#aaaacc; background:#111; padding:14px 24px; border-radius:10px;
      border:1px solid rgba(255,255,255,0.07);
    }
  </style>
</head>
<body>
<div class="header">
  <button class="back-btn" onclick="goBack()">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="8,2 3,6 8,10"/></svg>
    Games
  </button>
  <span style="font-size:15px;font-weight:700;">🔫 Standoff Tactics</span>
  <div class="info-row">
    <div class="badge" style="color:#60a5fa">P1 <span id="sc1El">0</span></div>
    <div class="badge" style="color:#f87171">P2 <span id="sc2El">0</span></div>
    <div class="badge" id="roundEl">First to 5</div>
  </div>
</div>
<canvas id="c"></canvas>
<div id="overlay">
  <h2>🔫 Standoff Tactics</h2>
  <div class="sub">2-player top-down tactical shooter. First to 5 kills wins. Grab weapon crates for upgrades.</div>
  <div class="ctrl-grid">
    <span><b>P1 Move:</b> W A S D</span>
    <span><b>P2 Move:</b> Arrow Keys</span>
    <span><b>P1 Shoot:</b> I J K L</span>
    <span><b>P2 Shoot:</b> Numpad 8 4 5 6</span>
  </div>
  <button onclick="startGame()">Start Match</button>
</div>

<script>
'use strict';
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resize() {
  const hdr = document.querySelector('.header');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight - hdr.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Constants ─────────────────────────────────────────────────────────────────
const PR = 14;
const WIN_SCORE = 5;

const WEAPONS = {
  pistol:  { label:'Pistol',   delay:22, damage:35, speed:9,  spread:0,    shots:1, ammo:Infinity, color:'#fbbf24' },
  shotgun: { label:'Shotgun',  delay:50, damage:18, speed:7,  spread:0.30, shots:5, ammo:16,       color:'#f97316' },
  smg:     { label:'SMG',      delay: 7, damage:12, speed:10, spread:0.10, shots:1, ammo:40,       color:'#a78bfa' },
  sniper:  { label:'Sniper',   delay:55, damage:95, speed:14, spread:0,    shots:1, ammo:8,        color:'#38bdf8' },
};

// ── Map generator ─────────────────────────────────────────────────────────────
function makeMap(CW, CH) {
  const walls = [];
  // Border walls
  walls.push({ x:0,    y:0,    w:CW,  h:10 });
  walls.push({ x:0,    y:CH-10,w:CW,  h:10 });
  walls.push({ x:0,    y:0,    w:10,  h:CH });
  walls.push({ x:CW-10,y:0,    w:10,  h:CH });
  // Interior cover
  const defs = [
    { x:0.20,y:0.25,w:0.08,h:0.30 }, { x:0.72,y:0.25,w:0.08,h:0.30 },
    { x:0.40,y:0.10,w:0.20,h:0.08 }, { x:0.40,y:0.82,w:0.20,h:0.08 },
    { x:0.43,y:0.40,w:0.14,h:0.20 },
    { x:0.10,y:0.55,w:0.12,h:0.08 }, { x:0.78,y:0.55,w:0.12,h:0.08 },
    { x:0.30,y:0.70,w:0.08,h:0.06 }, { x:0.62,y:0.70,w:0.08,h:0.06 },
    { x:0.30,y:0.22,w:0.08,h:0.06 }, { x:0.62,y:0.22,w:0.08,h:0.06 },
  ];
  defs.forEach(d => walls.push({ x:d.x*CW, y:d.y*CH, w:d.w*CW, h:d.h*CH }));
  return walls;
}

function makePickupSpots(CW, CH) {
  return [
    { x:CW*0.15, y:CH*0.15 }, { x:CW*0.85, y:CH*0.15 },
    { x:CW*0.15, y:CH*0.85 }, { x:CW*0.85, y:CH*0.85 },
    { x:CW*0.50, y:CH*0.50 },
  ];
}

let players, bullets, pickups, walls, muzzleFlashes, hitMarkers;
let scores, gameActive, frame;
const keys = {};

window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  gameActive = true; frame = 0;
  scores = [0, 0];
  const CW = canvas.width, CH = canvas.height;
  walls   = makeMap(CW, CH);
  muzzleFlashes = []; hitMarkers = [];

  players = [
    makePlayer(CW*0.12, CH*0.5, 0, '#3b82f6', '#93c5fd',
      {up:'KeyW',down:'KeyS',left:'KeyA',right:'KeyD'},
      {up:'KeyI',down:'KeyK',left:'KeyJ',right:'KeyL'}),
    makePlayer(CW*0.88, CH*0.5, 1, '#ef4444', '#fca5a5',
      {up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight'},
      {up:'Numpad8',down:'Numpad5',left:'Numpad4',right:'Numpad6'}),
  ];
  bullets = [];

  // Spawn weapon pickups
  pickups = makePickupSpots(CW, CH).map(p => ({
    ...p, type: ['shotgun','smg','sniper'][Math.floor(Math.random()*3)], pulse: Math.random()*Math.PI*2
  }));

  document.getElementById('sc1El').textContent = 0;
  document.getElementById('sc2El').textContent = 0;
  document.getElementById('roundEl').textContent = 'First to 5';
  loop();
}

function makePlayer(x, y, idx, color, accent, moveKeys, shootKeys) {
  return { x, y, hp:100, maxHp:100, alive:true, color, accent, animT:0,
           facing:{x: idx===0?1:-1, y:0},
           shootCD:0, wKey:'pistol', ammo:Infinity,
           invuln:0, moveKeys, shootKeys };
}

let lastTS = 0;
function loop(ts = 0) {
  if (!gameActive) return;
  const dt = Math.min((ts - lastTS) / 16.67, 3);
  lastTS = ts;
  frame++;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function update(dt) {
  const CW = canvas.width, CH = canvas.height;
  const SPD = 3.4 * dt;

  players.forEach((p, pi) => {
    if (!p.alive) { p.respawnT = (p.respawnT||0) - dt; if (p.respawnT <= 0) respawn(p, pi); return; }
    if (p.invuln > 0) p.invuln -= dt;

    // Move
    let dx = 0, dy = 0;
    if (keys[p.moveKeys.up])    dy -= 1;
    if (keys[p.moveKeys.down])  dy += 1;
    if (keys[p.moveKeys.left])  dx -= 1;
    if (keys[p.moveKeys.right]) dx += 1;
    if (dx || dy) {
      const m = Math.hypot(dx, dy);
      const nx = p.x + (dx/m) * SPD, ny = p.y + (dy/m) * SPD;
      if (!wallCollides(nx, p.y, PR)) p.x = nx;
      if (!wallCollides(p.x, ny, PR)) p.y = ny;
      p.animT += dt;
    }
    p.x = Math.max(PR+10, Math.min(CW-PR-10, p.x));
    p.y = Math.max(PR+10, Math.min(CH-PR-10, p.y));

    // Aim
    let sdx=0, sdy=0;
    if (keys[p.shootKeys.up])    sdy -= 1;
    if (keys[p.shootKeys.down])  sdy += 1;
    if (keys[p.shootKeys.left])  sdx -= 1;
    if (keys[p.shootKeys.right]) sdx += 1;
    if (sdx||sdy) { const m=Math.hypot(sdx,sdy); p.facing={x:sdx/m,y:sdy/m}; }

    // Shoot
    if (p.shootCD > 0) p.shootCD -= dt;
    const w = WEAPONS[p.wKey];
    if ((sdx||sdy) && p.shootCD <= 0 && p.ammo > 0) {
      for (let s = 0; s < w.shots; s++) {
        const ang = Math.atan2(p.facing.y, p.facing.x) + (Math.random()-0.5)*w.spread;
        bullets.push({
          x: p.x + p.facing.x*(PR+4),
          y: p.y + p.facing.y*(PR+4),
          vx: Math.cos(ang)*w.speed, vy: Math.sin(ang)*w.speed,
          owner:pi, ttl:110, damage:w.damage, color:w.color,
        });
      }
      muzzleFlashes.push({ x:p.x+p.facing.x*(PR+10), y:p.y+p.facing.y*(PR+10), life:6, color:w.color });
      p.shootCD = w.delay;
      if (p.ammo !== Infinity) p.ammo--;
      if (p.ammo === 0) { p.wKey='pistol'; p.ammo=Infinity; }
    }

    // Pickups
    pickups.forEach((pk, pki) => {
      if (Math.hypot(p.x-pk.x, p.y-pk.y) < PR+16) {
        p.wKey = pk.type;
        p.ammo = WEAPONS[pk.type].ammo;
        pickups.splice(pki,1);
        setTimeout(() => {
          const CW2=canvas.width, CH2=canvas.height;
          const spots = makePickupSpots(CW2, CH2);
          const s = spots[Math.floor(Math.random()*spots.length)];
          pickups.push({...s, type:['shotgun','smg','sniper'][Math.floor(Math.random()*3)], pulse:0});
        }, 8000);
      }
    });
  });
  pickups.forEach(pk => pk.pulse = (pk.pulse+dt*0.1)%(Math.PI*2));

  // Bullets
  bullets.forEach(b => {
    b.x += b.vx*dt; b.y += b.vy*dt; b.ttl -= dt;
    // Wall hit
    if (wallCollides(b.x, b.y, 4)) { b.ttl = -1; hitMarkers.push({x:b.x, y:b.y, life:12}); }
  });

  // Bullet-player hit
  bullets.forEach(b => {
    if (b.ttl <= 0) return;
    players.forEach((p, pi) => {
      if (!p.alive || pi === b.owner || p.invuln > 0) return;
      if (Math.hypot(p.x-b.x, p.y-b.y) < PR+5) {
        p.hp -= b.damage;
        b.ttl = -1;
        hitMarkers.push({ x:p.x, y:p.y-PR-4, life:20, text: `-${b.damage}`, color:p.color });
        if (p.hp <= 0) {
          p.hp = 0; p.alive = false; p.respawnT = 90;
          scores[b.owner]++;
          document.getElementById(`sc${b.owner+1}El`).textContent = scores[b.owner];
          if (scores[b.owner] >= WIN_SCORE) endGame(b.owner);
        }
      }
    });
  });

  bullets        = bullets.filter(b => b.ttl > 0);
  muzzleFlashes  = muzzleFlashes.filter(m => (m.life -= dt) > 0);
  hitMarkers     = hitMarkers.filter(h => (h.life -= dt) > 0);
}

function wallCollides(x, y, r) {
  return walls.some(w => x+r>w.x && x-r<w.x+w.w && y+r>w.y && y-r<w.y+w.h);
}

function respawn(p, idx) {
  const CW = canvas.width, CH = canvas.height;
  p.x = idx === 0 ? CW*0.12 : CW*0.88;
  p.y = CH * 0.5;
  p.hp = p.maxHp; p.alive = true;
  p.wKey = 'pistol'; p.ammo = Infinity;
  p.invuln = 90;
  p.respawnT = 0;
}

function endGame(winnerIdx) {
  gameActive = false;
  setTimeout(() => {
    const ov = document.getElementById('overlay');
    ov.querySelector('h2').textContent = `Player ${winnerIdx+1} Wins! 🏆`;
    ov.querySelector('.sub').textContent = `Score: ${scores[0]} – ${scores[1]}`;
    ov.style.display = 'flex';
  }, 500);
}

function draw() {
  const CW = canvas.width, CH = canvas.height;
  ctx.clearRect(0, 0, CW, CH);

  // Floor
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, CW, CH);
  // Tile grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for (let x=0; x<CW; x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,CH); ctx.stroke(); }
  for (let y=0; y<CH; y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(CW,y); ctx.stroke(); }

  // Walls
  walls.slice(4).forEach(w => {
    ctx.fillStyle = '#1e293b';
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(w.x, w.y, w.w, w.h, 4); ctx.fill(); ctx.stroke();
  });
  // Border walls
  ctx.fillStyle = '#0f172a';
  walls.slice(0,4).forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

  // Pickups
  pickups.forEach(pk => {
    const pulse = 0.7 + Math.sin(pk.pulse*4)*0.3;
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#4f46e5';
    ctx.shadowBlur = 14; ctx.shadowColor = '#818cf8';
    ctx.beginPath(); ctx.roundRect(pk.x-13, pk.y-13, 26, 26, 6); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    const ico = {shotgun:'🔫',smg:'⚡',sniper:'🎯'}[pk.type];
    ctx.font = '14px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ico, pk.x, pk.y+1);
    ctx.restore();
  });

  // Bullets
  bullets.forEach(b => {
    ctx.save();
    ctx.shadowBlur = 8; ctx.shadowColor = b.color;
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Muzzle flashes
  muzzleFlashes.forEach(m => {
    ctx.save();
    ctx.globalAlpha = m.life/6;
    ctx.fillStyle = m.color;
    ctx.shadowBlur = 16; ctx.shadowColor = m.color;
    ctx.beginPath(); ctx.arc(m.x, m.y, 7, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Hit markers
  hitMarkers.forEach(h => {
    if (h.text) {
      ctx.globalAlpha = Math.min(1, h.life/10);
      ctx.fillStyle = h.color || '#ef4444';
      ctx.font = 'bold 12px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(h.text, h.x, h.y - (20-h.life)*0.8);
      ctx.globalAlpha = 1;
    } else {
      ctx.save();
      ctx.globalAlpha = h.life/12*0.6;
      ctx.fillStyle = '#94a3b8';
      ctx.beginPath(); ctx.arc(h.x, h.y, 3, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  });

  // Players
  players.forEach((p, pi) => {
    const ghost = !p.alive;
    ctx.save();
    if (ghost) { ctx.globalAlpha = 0.25; }
    else if (p.invuln > 0 && Math.floor(p.invuln/5)%2===0) ctx.globalAlpha = 0.5;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(p.x+3, p.y+PR*0.6, PR*0.7, PR*0.35, 0, 0, Math.PI*2); ctx.fill();

    // Body circle
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, PR, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = p.accent;
    ctx.beginPath(); ctx.arc(p.x, p.y, PR-3, 0, Math.PI*2); ctx.fill();

    // Player number
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(`P${pi+1}`, p.x, p.y+1);

    // Gun barrel
    ctx.strokeStyle = p.color; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.shadowBlur = 6; ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.moveTo(p.x+p.facing.x*PR, p.y+p.facing.y*PR);
    ctx.lineTo(p.x+p.facing.x*(PR+14), p.y+p.facing.y*(PR+14));
    ctx.stroke();
    ctx.shadowBlur = 0;

    // HP bar
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(p.x-PR, p.y-PR-10, PR*2, 5);
    const hr = p.hp/p.maxHp;
    ctx.fillStyle = hr>0.5?'#22c55e':hr>0.25?'#f59e0b':'#ef4444';
    ctx.fillRect(p.x-PR, p.y-PR-10, PR*2*hr, 5);

    // Weapon label
    ctx.fillStyle = p.accent;
    ctx.font='9px system-ui'; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(`${p.wKey}${p.ammo!==Infinity?` (${p.ammo})`:''}`, p.x, p.y+PR+3);

    ctx.restore();

    // Respawn timer
    if (ghost && p.respawnT > 0) {
      ctx.fillStyle = p.color;
      ctx.font='bold 11px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(`${Math.ceil(p.respawnT/60)}s`, p.x, p.y);
    }
  });
}

async function goBack() {
  try {
    const api = window.spaceAPI;
    if (api?.tabs) {
      const tabs = await api.tabs.list();
      const active = tabs.find(t => t.isActive);
      if (active) { api.tabs.navigate(active.id, 'space://games'); return; }
    }
  } catch (_) {}
  history.back();
}
</script>
</body>
</html>
