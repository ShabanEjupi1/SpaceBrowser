name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win
          - os: ubuntu-latest
            args: --linux
          - os: macos-14
            args: --mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone llama.cpp (native inference engine)
        run: git clone --depth=1 https://github.com/ggerganov/llama.cpp.git native/include/llama.cpp

      - name: Install dependencies
        run: npm ci

      - name: Build native addon
        run: node scripts/build-native.js

      - name: Build app (main + renderer)
        run: npm run build:all

      - name: Package with electron-builder
        run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: space-browser-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.dmg
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Space Browser v${{ steps.ver.outputs.version }}
          files: artifacts/**
          fail_on_unmatched_files: false
          draft: false
